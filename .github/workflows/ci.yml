name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build all packages
        run: npm run build

      - name: Run tests
        run: npm run test

  security-scan-dogfood:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install and build
        run: npm install && npm run build

      - name: DevSecOps scan on own source
        run: |
          node packages/cli/dist/bin/security-mvp.js scan ./packages \
            --format json \
            --output devsecops-report.json
        continue-on-error: true

      - name: CSPM scan on test fixtures
        run: |
          node packages/cli/dist/bin/security-mvp.js cspm ./test-fixtures/vulnerable-infra \
            --format json \
            --output cspm-report.json
        continue-on-error: true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            devsecops-report.json
            cspm-report.json
